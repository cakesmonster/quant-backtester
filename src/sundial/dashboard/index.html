<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日晷 - A 股市场看板</title>
    <link rel="stylesheet" href="/static/css/app.css?v=4" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="brand" aria-label="品牌">
            <span class="logo-dot" aria-hidden="true"></span>
            <div>
              <div class="brand-main">日晷</div>
              <div class="brand-sub">Sundial</div>
            </div>
          </div>

          <nav id="nav-tabs" class="nav-tabs" aria-label="主导航">
            <button class="nav-tab is-active" type="button" data-page="daily-replay">每日复盘</button>
            <button class="nav-tab" type="button" data-page="hot-list">热榜</button>
            <button class="nav-tab" type="button" data-page="stock-analysis">个股分析</button>
            <button class="nav-tab" type="button" data-page="strategy-backtest">策略回测</button>
            <button class="nav-tab" type="button" data-page="paper-account">模拟账户</button>
          </nav>
        </div>

        <div class="topbar-right" aria-label="市场状态与快捷区">
          <div class="market-state" id="market-state">
            <span class="pulse" aria-hidden="true"></span>
            <span id="market-status-text">交易中</span>
            <span class="mono" id="market-clock">--:--:-- CST</span>
          </div>
          <div class="search-pill" aria-hidden="true">
            <span>搜索代码</span>
            <span class="kbd"><kbd>⌘</kbd><kbd>K</kbd></span>
          </div>
          <span class="avatar" aria-label="账户">道</span>
        </div>
      </header>

      <div class="ticker-tape" aria-label="市场行情带">
        <div id="market-tape" class="tape"></div>
      </div>

      <main class="page-wrap" id="page-host" aria-live="polite">
        <section class="card">
          <div class="card-body">
            <div class="skeleton-grid">
              <div class="skeleton" style="height: 22px"></div>
              <div class="skeleton" style="height: 22px"></div>
              <div class="skeleton" style="height: 22px"></div>
              <div class="skeleton" style="height: 22px"></div>
              <div class="skeleton" style="height: 22px"></div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>数据更新时间：<strong id="updated-at">--</strong></span>
        <span>数据口径：A股市场实时数据</span>
      </footer>
    </div>

    <aside id="hover-card" class="hover-card" aria-hidden="true">
      <h5 id="hover-card-name">--</h5>
      <div id="hover-card-code" class="section-note" style="margin-top:2px">--</div>
      <div id="hover-fields" class="hover-grid"></div>
      <div id="hover-tags" class="hover-tags"></div>
    </aside>

    <script>
    // 实时时钟 + 交易状态
    (function tick() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
      var timeStr = [h,m,s].map(function(x){return (x<10?'0':'')+x}).join(':') + ' CST';
      var el = document.getElementById('market-clock');
      if (el) el.textContent = timeStr;
      var st = document.getElementById('market-status-text');
      if (st) {
        var weekday = now.getDay();
        var isTrade = weekday >= 1 && weekday <= 5;
        var isOpen = isTrade && (
          (h>=9 && m>=30 && h<11) ||
          (h===11 && m<=30) ||
          (h>=13 && h<15)
        );
        st.textContent = !isTrade ? '休市' : isOpen ? '交易中' : (h<9||(h===9&&m<30)) ? '待开盘' : '已收盘';
      }
      setTimeout(tick, 1000);
    })();
    </script>
    <script src="/static/js/app.js?v=4"></script>
  </body>
</html>
