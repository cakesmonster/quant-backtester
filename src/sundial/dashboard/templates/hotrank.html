<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>日晷 — 热榜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8}
nav{display:flex;gap:2px;background:#161b22;padding:12px 20px;border-bottom:1px solid #30363d}
nav a{color:#8b949e;text-decoration:none;padding:6px 16px;border-radius:6px;font-size:14px}
nav a:hover,nav a.active{color:#f0f6fc;background:#21262d}
.container{max-width:1000px;margin:0 auto;padding:20px}
h1{font-size:20px;color:#58a6ff;margin-bottom:16px}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.controls input,.controls select{padding:6px 12px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#e1e4e8;font-size:14px}
.controls button{padding:6px 16px;border:none;border-radius:6px;background:#238636;color:#fff;cursor:pointer;font-size:14px}
.slot-btn{padding:6px 16px;border:1px solid #30363d;border-radius:6px;background:transparent;color:#8b949e;cursor:pointer;font-size:14px}
.slot-btn.active{background:#1f6feb;color:#fff;border-color:#1f6feb}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}
th,td{padding:10px 14px;text-align:left;font-size:14px;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:500;background:#0d1117}
td .code{color:#8b949e;font-size:12px}
.limit-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:#da3633;color:#fff}
.loading{color:#8b949e;text-align:center;padding:60px}
.empty{color:#8b949e;text-align:center;padding:60px;font-size:14px}
</style>
</head>
<body>
<nav>
  <a href="/review">📊 每日复盘</a>
  <a href="/hotrank" class="active">🔥 热榜</a>
  <a href="/stock">📈 个股</a>
  <a href="/backtest">⚡ 回测</a>
  <a href="/account">💰 账户</a>
</nav>
<div class="container">
  <h1>同花顺一小时热股榜</h1>
  <div class="controls">
    <input type="date" id="datePicker">
    <span style="color:#8b949e;font-size:14px">时段:</span>
    <button class="slot-btn" onclick="setSlot('1130')">11:30</button>
    <button class="slot-btn active" id="s1500" onclick="setSlot('1500')">15:00</button>
    <button class="slot-btn" id="s2100" onclick="setSlot('2100')">21:00</button>
    <button onclick="loadRank()">查询</button>
  </div>
  <div id="content" class="loading">加载中...</div>
</div>

<script>
let slot = '1500';
const today = new Date().toISOString().slice(0,10);
document.getElementById('datePicker').value = today;

function setSlot(s) { slot = s; document.querySelectorAll('.slot-btn').forEach(b=>b.classList.remove('active')); document.getElementById('s'+s).classList.add('active'); loadRank(); }
async function loadRank() {
  document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
  const date = document.getElementById('datePicker').value;
  const r = await fetch(`/api/hotrank?date=${date}&slot=${slot}`);
  const d = await r.json();
  const items = d.items || [];
  if (!items.length){ document.getElementById('content').innerHTML='<div class="empty">该时段暂无热榜数据（cron 定时采集，非交易时段可能为空）</div>'; return; }
  document.getElementById('content').innerHTML = `
    <table><thead><tr><th>#</th><th>代码</th><th>名称</th><th>热度</th><th>概念</th><th>涨停</th></tr></thead><tbody>
    ${items.map(i=>`<tr>
      <td>${i.rank}</td>
      <td><span class="code">${i.code}</span></td>
      <td>${i.name}</td>
      <td>${(i.heat_value||0).toLocaleString()}</td>
      <td style="font-size:12px;color:#8b949e">${(i.concept_tag||'').split(';').slice(0,3).join(' · ')}</td>
      <td>${i.is_limit_up?'<span class="limit-badge">涨停</span>':'-'}</td>
    </tr>`).join('')}
    </tbody></table>`;
}
loadRank();
</script>
</body>
</html>
