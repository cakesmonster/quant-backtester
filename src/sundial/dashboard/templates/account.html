<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>日晷 — 模拟账户</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8}
nav{display:flex;gap:2px;background:#161b22;padding:12px 20px;border-bottom:1px solid #30363d}
nav a{color:#8b949e;text-decoration:none;padding:6px 16px;border-radius:6px;font-size:14px}
nav a:hover,nav a.active{color:#f0f6fc;background:#21262d}
.container{max-width:1000px;margin:0 auto;padding:20px}
h1{font-size:20px;color:#58a6ff;margin-bottom:16px}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.controls input{padding:6px 12px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#e1e4e8;font-size:14px}
.controls button{padding:6px 16px;border:none;border-radius:6px;background:#238636;color:#fff;cursor:pointer;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h3{font-size:12px;color:#8b949e;margin-bottom:8px}
.card .value{font-size:28px;font-weight:700;color:#f0f6fc}
.up{color:#3fb950}.down{color:#f85149}
table{width:100%;border-collapse:collapse;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-top:16px}
th,td{padding:10px 14px;text-align:left;font-size:14px;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:500;background:#0d1117}
.loading{color:#8b949e;text-align:center;padding:60px}
.empty{color:#8b949e;text-align:center;padding:60px;font-size:14px}
</style>
</head>
<body>
<nav>
  <a href="/review">📊 每日复盘</a>
  <a href="/hotrank">🔥 热榜</a>
  <a href="/stock">📈 个股</a>
  <a href="/backtest">⚡ 回测</a>
  <a href="/account" class="active">💰 账户</a>
</nav>
<div class="container">
  <h1>模拟账户</h1>
  <div class="controls">
    <input type="date" id="datePicker">
    <button onclick="loadAccount()">查询</button>
    <button onclick="saveSnapshot()" style="background:#1f6feb">保存当日快照</button>
  </div>
  <div id="content" class="loading">加载中...</div>
</div>

<script>
const today = new Date().toISOString().slice(0,10);
document.getElementById('datePicker').value = today;

async function loadAccount() {
  const date = document.getElementById('datePicker').value;
  const r = await fetch(`/api/account?date=${date}`);
  const d = await r.json();
  if(!d.total_asset){ document.getElementById('content').innerHTML='<div class="empty">该日期无账户快照</div>'; return; }
  
  document.getElementById('content').innerHTML = `
    <div class="grid">
      <div class="card"><h3>总资产</h3><div class="value">${d.total_asset.toLocaleString()}</div></div>
      <div class="card"><h3>可用资金</h3><div class="value">${d.available_cash.toLocaleString()}</div></div>
      <div class="card"><h3>持仓市值</h3><div class="value">${d.position_value.toLocaleString()}</div></div>
      <div class="card"><h3>当日盈亏</h3><div class="value ${d.daily_pnl>=0?'up':'down'}">${d.daily_pnl>=0?'+':''}${d.daily_pnl.toLocaleString()}</div></div>
    </div>
    ${d.holdings && d.holdings.length ? `
    <h2 style="font-size:16px;color:#f0f6fc;margin:20px 0 12px">持仓明细</h2>
    <table><thead><tr><th>代码</th><th>名称</th><th>数量</th><th>成本</th><th>现价</th><th>盈亏%</th></tr></thead><tbody>
    ${d.holdings.map(h=>`<tr>
      <td>${h.code}</td><td>${h.name}</td><td>${h.qty}</td>
      <td>${h.cost}</td><td>${h.price}</td>
      <td class="${h.pnl_pct>=0?'up':'down'}">${h.pnl_pct>=0?'+':''}${h.pnl_pct}%</td>
    </tr>`).join('')}
    </tbody></table>`:''}
  `;
}

function saveSnapshot() {
  const a=prompt('总资产:'),b=prompt('可用资金:'),c=prompt('持仓市值:'),d=prompt('当日盈亏:');
  if(!a) return;
  fetch(`/api/account/save?date=${document.getElementById('datePicker').value}&total_asset=${a}&available_cash=${b}&position_value=${c}&daily_pnl=${d}&holdings=[]`,{method:'POST'}).then(r=>r.json()).then(d=>{alert('已保存');loadAccount();});
}
loadAccount();
</script>
</body>
</html>
