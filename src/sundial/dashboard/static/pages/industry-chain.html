<div class="chain-container" id="chain-container">
  <div id="chain-graph-toolbar">
    <h2 id="chain-graph-title">🌐 全产业超级图谱</h2>
    <input id="chain-search" type="text" placeholder="搜索公司或环节..." autocomplete="off">
  </div>
  <div id="chain-legend"></div>
  <div id="chain-tooltip"></div>
  <div id="chain-panel">
    <button id="chain-panel-close">&times;</button>
    <div id="chain-panel-content"></div>
  </div>
  <div id="chain-graph-hint">🖱 拖拽节点 · 滚轮缩放 · 悬停看概要 · <b>点击看涟漪效应</b></div>
  <div id="chain-loading">⏳ 加载产业链数据...</div>
  <svg id="chain-graph-svg"></svg>
</div>
