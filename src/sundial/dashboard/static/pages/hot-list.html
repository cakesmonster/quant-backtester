<section class="page is-active" data-page="hot-list">
  <section class="card">
    <div class="card-head">
      <div>
        <h2 class="card-title">热榜</h2>
        <p class="card-subtitle">选择日期和时段查看历史热榜</p>
      </div>
      <div class="controls">
        <input id="hot-date" type="date" />
        <select id="hot-hour" aria-label="选择小时"></select>
        <span class="hour-suffix">:00</span>
        <button id="hot-now" class="btn-ghost" type="button">当前</button>
      </div>
    </div>
    <div class="card-body">
      <div id="hot-empty" style="display:none;padding:32px;text-align:center;color:var(--muted)">该时段暂无热榜数据</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="right sortable">排名</th>
              <th>代码</th>
              <th>名称</th>
              <th class="right sortable">热度值</th>
              <th>概念标签</th>
              <th class="right sortable">涨跌幅</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="hot-body"></tbody>
        </table>
      </div>
    </div>
  </section>
</section>
