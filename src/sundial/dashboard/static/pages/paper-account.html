<section class="page is-active" data-page="paper-account">
  <section class="card">
    <div class="card-head">
      <div>
        <h2 class="card-title">模拟账户</h2>
        <p class="card-subtitle">持仓与成交联动 · 每笔买卖配对追踪</p>
      </div>
      <div class="controls">
        <label class="section-note" for="account-date">账户日期</label>
        <input id="account-date" type="date" />
      </div>
    </div>
    <div class="card-body">
      <div id="account-metrics" class="kpi-row"></div>
      <div id="account-micro-bars" class="account-micro" aria-label="账户微观强度条"></div>
    </div>
  </section>

  <section class="page-grid-2">
    <article class="card">
      <div class="card-head">
        <h3 class="card-title">持仓结构</h3>
        <p class="card-subtitle">按市值占比</p>
      </div>
      <div class="card-body">
        <div class="chart-wrap">
          <canvas id="position-donut" class="canvas" aria-label="持仓结构环形图"></canvas>
        </div>
      </div>
    </article>

    <article class="card">
      <div class="card-head">
        <h3 class="card-title">今日成交</h3>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="sortable">时间</th>
                <th>代码</th>
                <th class="sortable">方向</th>
                <th class="right sortable">价格</th>
                <th class="right sortable">数量</th>
                <th class="right sortable">金额</th>
              </tr>
            </thead>
            <tbody id="trade-body"></tbody>
          </table>
        </div>
      </div>
    </article>
  </section>

  <section class="card">
    <div class="card-head">
      <h3 class="card-title">历史交易记录</h3>
      <p class="card-subtitle">每笔买入→卖出配对追踪 · 未平仓标记「持仓中」</p>
    </div>
    <div class="card-body">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>个股</th>
              <th class="sortable">买入时间</th>
              <th class="right">买入价</th>
              <th class="right">买入股数</th>
              <th class="sortable">卖出时间</th>
              <th class="right">卖出价</th>
              <th class="right">卖出股数</th>
              <th class="right sortable">盈亏金额</th>
              <th class="right sortable">盈亏%</th>
            </tr>
          </thead>
          <tbody id="trade-pairs-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="page-grid-2">
    <article class="card">
      <div class="card-head">
        <h3 class="card-title">当前持仓</h3>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>代码</th>
                <th>名称</th>
                <th class="right sortable">数量</th>
                <th class="right sortable">成本</th>
                <th class="right sortable">现价</th>
                <th class="right sortable">市值</th>
                <th class="right sortable">盈亏%</th>
                <th class="right sortable">盈亏金额</th>
              </tr>
            </thead>
            <tbody id="position-body"></tbody>
          </table>
        </div>
      </div>
    </article>
  </section>
</section>
